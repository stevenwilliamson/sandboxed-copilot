services:
  proxy:
    build:
      context: ./proxy
    image: sandboxed-copilot-proxy
    networks:
      - internal
      - external
    environment:
      # Per-session allowlist filename — set by the launcher to isolate concurrent sessions.
      - PROJECT_ALLOWLIST_FILE=${PROJECT_ALLOWLIST_FILE:-project-allowlist.txt}
    volumes:
      # Mount the config directory (not the file) to avoid Docker Desktop on macOS
      # bind-mount inode tracking issues when the file is atomically replaced by editors.
      # Read-only — the proxy reads allowlist/mode files AND ca.crt/ca.key from here.
      - ./config:/etc/squid/config:ro
      # Persistent cache for Squid's dynamically generated leaf certificates.
      # Contains only public cert material — safe to persist across restarts.
      - ssl-db:/var/lib/ssl_db
    restart: unless-stopped
    # Healthcheck: confirm Squid is listening before allowing the copilot container
    # to start. Uses bash's built-in /dev/tcp without requiring extra packages.
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/3128"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  copilot:
    build:
      context: .
      target: standard
    image: ${COPILOT_IMAGE:-sandboxed-copilot-standard}
    networks:
      # Internal-only: no direct internet route. All traffic goes via the proxy.
      - internal
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      # Workspace is injected at runtime by the sandboxed-copilot script.
      - ${COPILOT_WORKSPACE:-.}:/workspace
      # Persist shell history — volume is per-session-project so each workspace
      # gets its own history.
      - shell-history:/home/copilot/.shell_history
      # Mount only the CA public certificate (not the key) into the copilot
      # container so the entrypoint can install it into the system trust store.
      # Single-file mount is safe here: ca.crt is written once at install time
      # and never atomically replaced (no macOS Docker inode issue).
      - ./config/ca.crt:/etc/squid/ca/ca.crt:ro
      # Package dependency cooldown config (integer days, default 7).
      # Managed via: sandboxed-copilot cooldown [N|disable|status]
      # entrypoint.sh reads this and configures npm, uv, yarn, bun, and deno.
      - ./config/package-cooldown:/etc/sandboxed-copilot/package-cooldown:ro
    working_dir: /workspace
    depends_on:
      proxy:
        condition: service_healthy
    stdin_open: true
    tty: true
    # ── Security hardening ────────────────────────────────────────────────────
    # Drop ALL Linux capabilities from the bounding set. The container runs as
    # root, but with cap_drop: ALL even root has zero Linux capabilities — it
    # cannot mount filesystems, load kernel modules, create device nodes, or
    # manipulate namespaces. This is the primary containment layer against
    # container escape. A separate non-root user would add no meaningful
    # boundary in a single-user container where the agent can write and execute
    # arbitrary software regardless of UID.
    cap_drop:
      - ALL
    # Custom seccomp profile: extends Docker's default to additionally block
    # ptrace/process_vm_* (process injection) and io_uring_* (historical CVEs;
    # libuv disabled by default so Node.js LTS does not require it).
    # bpf, perf_event_open, and other CAP_SYS_ADMIN-gated syscalls are already
    # blocked by cap_drop: ALL without needing explicit rules here.
    security_opt:
      - "seccomp=./config/seccomp.json"
    # Disable IPv6 to prevent potential bypass of HTTP_PROXY interception.
    # All Copilot and GitHub APIs are reachable over IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    # Limit process count to prevent fork bombs and runaway process creation.
    # A legitimate Copilot session uses far fewer than 512 processes.
    pids_limit: 512
    # Limit memory to prevent a misbehaving agent from exhausting the host.
    mem_limit: 4g
    memswap_limit: 4g
    # Mount /tmp as a tmpfs with noexec — prevents binaries dropped to /tmp
    # from being executed directly (a common local exploit staging technique).
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
    # Increase /dev/shm size for Chrome/browser automation in the full variant.
    # Docker's default 64MB causes Chrome crashes on complex pages.
    # Harmless for minimal and standard variants.
    shm_size: 2gb

networks:
  # The copilot container lives here only — no route to the internet.
  internal:
    internal: true
  # The proxy bridges between this network and the internet.
  external: {}

volumes:
  # Per-session name (no override) so each workspace has its own shell history.
  shell-history:
  # Squid ssl_db: cache of dynamically generated leaf certificates for ssl_bump.
  # Contains only public cert material; safe to persist across restarts.
  ssl-db:
