# Squid forward proxy for sandboxed-copilot.
#
# All outbound connections are denied by default. Only domains listed in
# allowlist.txt are reachable. Edit allowlist.txt on the host — the proxy
# reloads automatically every 5 seconds when changes are detected.
#
# The proxy mode can be changed from the host with `sandboxed-copilot proxy`:
#   allow-all  — open all outbound traffic (with an auto-expiry timer)
#   lock       — restrict to the minimum domains required for Copilot CLI
#   reset      — restore the normal user allowlist

# ssl_bump: intercept HTTPS tunnels using the per-install CA certificate.
# The CA cert (ca.crt) and key (ca.key) are generated by install.sh and
# mounted read-only from the host config directory at /etc/squid/config/.
# Squid dynamically signs a certificate for each upstream host and presents
# it to the copilot container (which trusts the CA via its system trust store).
#
# The ssl_db directory holds only Squid's cache of dynamically generated
# leaf certificates (public material only).
http_port 3128 ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB \
    cert=/etc/squid/config/ca.crt \
    key=/etc/squid/config/ca.key

# ssl_crtd helper — generates and caches per-host leaf certificates signed
# by the CA. The -s path is initialised by the entrypoint before Squid starts.
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db/db -M 4MB
sslcrtd_children 8 startup=1 idle=1

# ssl_bump policy:
#   step1 — peek at the TLS ClientHello to read the SNI hostname. This lets
#            Squid apply dstdomain ACLs before committing to a bump decision.
#   all   — bump (intercept) every connection that passes access control.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Use reliable external DNS rather than the internal Docker resolver
dns_nameservers 8.8.8.8 8.8.4.4

# Drop privileges to the system 'proxy' user (required by squid v6)
cache_effective_user proxy
cache_effective_group proxy

# CONNECT method ACL (used in all modes)
acl CONNECT method CONNECT

# Strip headers that would leak internal network information to external servers.
# forwarded_for off — removes X-Forwarded-For (hides copilot container internal IP)
# via off          — removes Via header (hides internal Squid version and hostname)
forwarded_for off
via off

# Access rules are written dynamically by the entrypoint based on the current
# proxy mode (normal / allow-all / lock). The file is regenerated and squid is
# reconfigured whenever the mode or allowlist changes.
#
# ── GitHub token exfiltration detection ─────────────────────────────────────
# These rules are placed BEFORE the include so they apply in ALL proxy modes,
# including allow-all. Token exfiltration protection is not a user toggle.
#
# Legitimate destinations for GitHub tokens (never blocked).
acl github_infra dstdomain .github.com .githubusercontent.com .githubcopilot.com
#
# Fast-path ACL detection — headers and URL are visible before any ICAP roundtrip.
#
# Match GitHub token formats in the Authorization request header value.
# Patterns: ghp_ gho_ ghs_ ghu_ (OAuth/PAT, 40 chars) and github_pat_ (fine-grained).
acl github_token_exfil_header req_header Authorization -i (ghp_|gho_|ghs_|ghu_|github_pat_)[A-Za-z0-9_]{20,}
#
# Match GitHub token formats embedded in the request URL (query string or path).
acl github_token_exfil_url url_regex -i (ghp_|gho_|ghs_|ghu_|github_pat_)[A-Za-z0-9_]{20,}
#
# Combined ACL used to filter the exfil access_log.
acl github_token_exfil_any any-of github_token_exfil_header github_token_exfil_url
#
# Block header and URL token leakage before evaluating mode-specific rules.
http_access deny github_token_exfil_header !github_infra
http_access deny github_token_exfil_url    !github_infra
#
# Dedicated exfil log — records header/URL detections. Only the destination
# host is logged (not the full URL) to avoid persisting token values that may
# appear in request URLs. ICAP body detections are appended by the scanner.
# Format: timestamp client method dest-host http-status
logformat exfil_fmt %ts.%03tu %>a %rm %>h %>Hs
access_log /var/log/squid/exfil.log exfil_fmt github_token_exfil_any !github_infra
#
# ── ICAP — body scanning for POST / PUT / PATCH ──────────────────────────────
# The icap-scanner process listens on 127.0.0.1:1344 and inspects request bodies
# for GitHub token patterns. bypass=off means that if the scanner is unavailable,
# POST/PUT/PATCH requests to non-GitHub destinations FAIL rather than bypassing
# detection silently.
icap_enable on
icap_send_client_ip on
icap_service github_token_scanner reqmod_precache \
    bypass=off \
    icap://127.0.0.1:1344/github-token-scanner
#
# Only send request methods that carry a body to the ICAP service.
# Two rules cover different destinations:
#   1. Non-GitHub destinations: scan for token exfiltration in body.
#   2. api.github.com: scan for dangerous REST API endpoint usage (Shai-Hulud
#      class), even though tokens are legitimate there. Other github.com
#      subdomains (git push/pull via Smart HTTP, Copilot API, etc.) are not
#      sent to the scanner.
acl api_github dstdomain api.github.com
acl req_has_body method POST PUT PATCH
adaptation_access github_token_scanner allow req_has_body !github_infra
adaptation_access github_token_scanner allow req_has_body api_github
adaptation_access github_token_scanner deny all
# ─────────────────────────────────────────────────────────────────────────────
include /etc/squid/access_rules.conf

# Disable response caching — this proxy is a firewall, not a cache
cache deny all

# Log to files (the 'proxy' user can write these; tail streams them to Docker stdout)
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
