# Squid forward proxy for sandboxed-copilot.
#
# All outbound connections are denied by default. Only domains listed in
# allowlist.txt are reachable. Edit allowlist.txt on the host — the proxy
# reloads automatically every 5 seconds when changes are detected.
#
# The proxy mode can be changed from the host with `sandboxed-copilot proxy`:
#   allow-all  — open all outbound traffic (with an auto-expiry timer)
#   lock       — restrict to the minimum domains required for Copilot CLI
#   reset      — restore the normal user allowlist

# ssl_bump: intercept HTTPS tunnels using the per-install CA certificate.
# The CA cert (ca.crt) and key (ca.key) are generated by install.sh and
# mounted read-only from the host config directory at /etc/squid/config/.
# Squid dynamically signs a certificate for each upstream host and presents
# it to the copilot container (which trusts the CA via its system trust store).
#
# The ssl_db directory holds only Squid's cache of dynamically generated
# leaf certificates (public material only).
http_port 3128 ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB \
    cert=/etc/squid/config/ca.crt \
    key=/etc/squid/config/ca.key

# ssl_crtd helper — generates and caches per-host leaf certificates signed
# by the CA. The -s path is initialised by the entrypoint before Squid starts.
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db/db -M 4MB
sslcrtd_children 8 startup=1 idle=1

# ssl_bump policy:
#   step1 — peek at the TLS ClientHello to read the SNI hostname. This lets
#            Squid apply dstdomain ACLs before committing to a bump decision.
#   all   — bump (intercept) every connection that passes access control.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Use reliable external DNS rather than the internal Docker resolver
dns_nameservers 8.8.8.8 8.8.4.4

# Drop privileges to the system 'proxy' user (required by squid v6)
cache_effective_user proxy
cache_effective_group proxy

# CONNECT method ACL (used in all modes)
acl CONNECT method CONNECT

# Strip headers that would leak internal network information to external servers.
# forwarded_for off — removes X-Forwarded-For (hides copilot container internal IP)
# via off          — removes Via header (hides internal Squid version and hostname)
forwarded_for off
via off

# Access rules are written dynamically by the entrypoint based on the current
# proxy mode (normal / allow-all / lock). The file is regenerated and squid is
# reconfigured whenever the mode or allowlist changes.
include /etc/squid/access_rules.conf

# Disable response caching — this proxy is a firewall, not a cache
cache deny all

# Log to files (the 'proxy' user can write these; tail streams them to Docker stdout)
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
